name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN に Pages へデプロイする権限を与える
permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイを1つに制限する。進行中のデプロイは中断しない。
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: 静的エクスポートのビルド
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Pages の設定を取得
        uses: actions/configure-pages@v5

      - run: npm ci

      - name: ビルド
        env:
          # GitHub Pages はプロジェクトサイトを /<リポジトリ名>/ 配下で配信するため
          # basePath が必要。
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          # 実データモードにはサーバーが必要なため、Pages では常にデモ。
          NEXT_PUBLIC_DATA_MODE: demo
        run: npm run build

      - name: .nojekyll を追加
        # _next ディレクトリがアンダースコア始まりのため、Jekyll に無視されないようにする
        run: touch out/.nojekyll

      - name: 成果物をアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    name: Pages へデプロイ
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: デプロイ
        id: deployment
        uses: actions/deploy-pages@v4
