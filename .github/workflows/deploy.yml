name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    # 監視ワークフローによる状態ファイルのみの更新では再デプロイしない
    paths-ignore:
      - "monitor/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: 静的エクスポートのビルド
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Pages の設定を取得
        uses: actions/configure-pages@v6

      - run: npm ci

      - name: ビルド
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_DATA_MODE: demo
        run: npm run build

      - name: .nojekyll を追加
        run: touch out/.nojekyll

      - name: 成果物をアップロード
        uses: actions/upload-pages-artifact@v5
        with:
          path: out

  deploy:
    name: Pages へデプロイ
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: デプロイ
        id: deployment
        uses: actions/deploy-pages@v5
