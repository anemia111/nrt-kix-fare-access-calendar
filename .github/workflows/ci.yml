name: CI

on:
  push:
    branches: [main]
    # 監視ワークフローによる状態ファイルのみの更新では CI を回さない
    paths-ignore:
      - "monitor/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    name: 型チェック・Lint・テスト・ビルド
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Node.js のセットアップ
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: 依存パッケージのインストール
        run: npm ci

      - name: 型チェック（アプリ）
        run: npm run typecheck

      - name: 型チェック（Cloudflare Worker）
        run: npm run typecheck:worker

      - name: Lint
        run: npm run lint

      - name: ユニットテスト（Vitest）
        run: npm run test

      - name: 本番ビルド（静的エクスポート）
        # 実データ検索のE2Eを動かすため、テスト用に同一オリジンのAPIベースURLを渡す。
        # 実際のデプロイは deploy.yml が別途ビルドする。
        env:
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:3100
        run: npm run build

      - name: ビルド成果物にAPIキーが含まれないことを確認
        run: npx vitest run tests/buildArtifact.test.ts

      - name: Playwright ブラウザのインストール
        run: npx playwright install --with-deps chromium webkit

      - name: E2Eテスト（Playwright）
        env:
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:3100
        run: npm run test:e2e

      - name: 失敗時のレポートを保存
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  security:
    name: 依存パッケージの脆弱性確認
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: npm audit
        run: npm audit --audit-level=moderate

      - name: 秘密情報がコミットされていないか確認
        run: |
          if git ls-files | grep -E '^\.env$|^\.env\.local$|^\.env\.production$'; then
            echo "::error::.env ファイルがコミットされています"
            exit 1
          fi
          echo "OK: .env はコミットされていません"
